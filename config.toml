# The URL the site will be built for
base_url = "https://eversole.dev"
description = "Kenneth Eversole builds software at the intersection of engineering, operations, and innovation. Creator of OpsCompanion. Writing about software, infrastructure, and startups."
title = "Kenneth Eversole — Builder, Engineer, Operator"
# Whether to automatically compile all Sass files in the sass directory
compile_sass = true
# The default language; used in feeds.
default_language = "en"

generate_feeds = true
build_search_index = true
minify_html = true
feed_filenames = ["atom.xml"]
ignored_content = ["*.excalidraw.md"]


# The site theme to use.
taxonomies = [{ name = "tags", feed = true }]


[markdown]
highlighting = { theme = "github-dark" }


[extra]

theme = "dark"

menu = [
    { name = "blog", url = "/blog", weight = 1 },
    { name = "about", url = "/about", weight = 2 },
    { name = "books", url = "/books", weight = 3 },
    { name = "search", url = "/search", weight = 4 },
]

socials = [
    { name = "github", url = "https://github.com/kennetheversole/", icon = "github" },
    { name = "linkedin", url = "https://www.linkedin.com/in/kennetheversole/", icon = "linkedin" },
    { name = "email", url = "mailto:kenneth@eversole.dev", icon = "email" },
    { name = "rss", url = "https://eversole.dev/atom.xml", icon = "rss"}
]



profile_photo = "/images/Logo_W_Text.png"
#profiles
github = "kennetheversole"
linkedin = "kennetheversole"
email = "kenneth@eversole.dev"

read_time = true
favicon = "/images/favicon.svg"
author = "Kenneth Eversole"
twitter_username = "kennetheversole"

# Open Graph default image (1200x630px recommended)
default_og_image = "og-default.png"

# Cloudflare Web Analytics - Get your token from the Cloudflare dashboard
# cloudflare_analytics = "YOUR_CLOUDFLARE_ANALYTICS_TOKEN"
